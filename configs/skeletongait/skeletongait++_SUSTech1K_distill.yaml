data_cfg:
  dataset_name: SUSTech1K
  dataset_root: your_path
  dataset_partition: ./datasets/SUSTech1K/SUSTech1K.json
  num_workers: 4
  data_in_use: [True, True] # heatmap, sil
  remove_no_gallery: false # Remove probe if no gallery for it
  test_dataset_name: SUSTech1K
  cache: false

  # Distillation cache (from tools/export_teacher_cache.py)
  # Example:
  # teacher_cache_root: /data/xxx/teacher_cache_sus
  # teacher_index: /data/xxx/teacher_cache_sus/index.json
  teacher_cache_root: your_teacher_cache_root
  teacher_index: your_teacher_index_json

# Distillation switches (consumed by next model/loss integration step)
distill_cfg:
  enable: true
  teacher_source: robustcap_cache
  use_terms: [feat]          # MVP: feat only; later: [feat, motion, rel]
  teacher_global_dim: 102
  strict_teacher: false      # set true to raise error when a batch has no valid teacher cache
  lambda_feat: 1.0
  lambda_motion: 0.5
  lambda_rel: 0.2
  warmup_epoch: 10

evaluator_cfg:
  enable_float16: true
  restore_ckpt_strict: true
  restore_hint: 50000
  save_name: SkeletonGaitPP_Distill
  eval_func: evaluate_indoor_dataset #evaluate_Gait3D
  sampler:
    batch_shuffle: false
    batch_size: 4
    sample_type: all_ordered # all indicates whole sequence used to test, while ordered means input sequence by its natural order; Other options: fixed_unordered
    frames_all_limit: 720 # limit the number of sampled frames to prevent out of memory
  metric: euc # cos
  transform:
    - type: BaseSilCuttingTransform

loss_cfg:
  - loss_term_weight: 1.0
    margin: 0.2
    type: TripletLoss
    log_prefix: triplet
  - loss_term_weight: 1.0
    scale: 16
    type: CrossEntropyLoss
    log_prefix: softmax
    log_accuracy: true
  - loss_term_weight: 1.0
    type: FeatureDistillLoss
    mode: mse
    normalize: true
    log_prefix: distill_feat

model_cfg:
  model: SkeletonGaitPP
  Backbone:
    in_channels: 3
    blocks:
      - 1
      - 1
      - 1
      - 1
    C: 2
  SeparateBNNecks:
    class_num: 250

optimizer_cfg:
  lr: 0.1
  momentum: 0.9
  solver: SGD
  weight_decay: 0.0005

scheduler_cfg:
  gamma: 0.1
  milestones: # Learning Rate Reduction at each milestones
    - 20000
    - 30000
    - 40000
  scheduler: MultiStepLR

trainer_cfg:
  enable_float16: true # half_percesion float for memory reduction and speedup
  fix_BN: false
  with_test: false #true
  log_iter: 100
  restore_ckpt_strict: true
  restore_hint: 0
  save_iter: 10000
  save_name: SkeletonGaitPP_Distill
  sync_BN: true
  total_iter: 50000
  sampler:
    batch_shuffle: true
    batch_size:
      - 8 # TripletSampler, batch_size[0] indicates Number of Identity
      - 8 #                 batch_size[1] indicates Samples sequqnce for each Identity
    frames_num_fixed: 10 # fixed frames number for training
    frames_skip_num: 4
    sample_type: fixed_ordered # fixed control input frames number, unordered for controlling order of input tensor; Other options: unfixed_ordered or all_ordered
    type: TripletSampler
  transform:
    - type: Compose
      trf_cfg:
        - type: RandomPerspective
          prob: 0.2
        - type: BaseSilCuttingTransform
        - type: RandomHorizontalFlip
          prob: 0.2
        - type: RandomRotate
          prob: 0.2
